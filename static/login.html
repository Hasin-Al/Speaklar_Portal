<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Speaklar Portal | Login</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <style>
      body {
        background: linear-gradient(135deg, #f6f7fb, #eef2f7);
      }
      .auth-card {
        max-width: 420px;
      }
      .brand {
        letter-spacing: 0.3px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-white shadow-sm">
      <div class="container">
        <span class="navbar-brand fw-semibold brand">Speaklar Portal</span>
        <div class="ms-auto">
          <a class="btn btn-outline-primary" href="/register">Create account</a>
        </div>
      </div>
    </nav>

    <main class="container d-flex justify-content-center align-items-center" style="min-height: calc(100vh - 72px);">
      <div class="card auth-card shadow-sm w-100">
        <div class="card-body p-4">
          <h1 class="h4 mb-3">Welcome back</h1>
          <p class="text-muted mb-4">Sign in to access your chat workspace.</p>

          <form id="loginForm">
            <div class="mb-3">
              <label class="form-label" for="username">Username</label>
              <input class="form-control" id="username" type="text" required minlength="3" />
            </div>
            <div class="mb-3">
              <label class="form-label" for="password">Password</label>
              <input class="form-control" id="password" type="password" required minlength="6" />
            </div>
            <div class="d-grid">
              <button class="btn btn-primary" type="submit">Login</button>
            </div>
          </form>

          <div id="status" class="alert alert-warning mt-3 d-none"></div>
        </div>
      </div>
    </main>

    <script>
      const statusEl = document.getElementById("status");

      async function postJSON(url, payload) {
        const res = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) {
          const msg = data.detail || "Request failed";
          throw new Error(msg);
        }
        return data;
      }

      document.getElementById("loginForm").addEventListener("submit", async (event) => {
        event.preventDefault();
        statusEl.classList.add("d-none");

        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;

        try {
          const data = await postJSON("/login", { username, password });
          localStorage.setItem("session_id", data.session_id);
          localStorage.setItem("username", username);
          window.location.href = "/chat";
        } catch (err) {
          statusEl.textContent = err.message;
          statusEl.classList.remove("d-none");
        }
      });
    </script>
  </body>
</html>
